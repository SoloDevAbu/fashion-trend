services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fashion-trend-backend:latest
    container_name: fashion-trend-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      SCRAPE_HEADLESS: "true"
    volumes:
      - crawlee_storage:/app/.crawlee
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  crawlee_storage:
